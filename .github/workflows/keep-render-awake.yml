name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          if [ -z "$RENDER_API_URL" ]; then
            echo "Secret RENDER_API_URL manquant. Définissez l'URL du backend Render (sans /api)."
            exit 1
          fi
          url="${RENDER_API_URL%/}/api/"
          echo "Ping: $url"
        
          for attempt in 1 2 3; do
            if curl -fsS --max-time 120 "$url"; then
              echo "OK (tentative $attempt)"
              exit 0
            fi
            echo "Tentative $attempt échouée, nouvel essai dans 20 s..."
            sleep 20
          done
          echo "Échec après 3 tentatives (service injoignable ou URL incorrecte)."
          exit 1
