name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          if [ -z "$RENDER_API_URL" ]; then
            echo "Secret RENDER_API_URL manquant. Définissez l'URL du backend Render (sans /api)."
            exit 1
          fi
          curl -fsS --max-time 30 "${RENDER_API_URL%/}/api/"
